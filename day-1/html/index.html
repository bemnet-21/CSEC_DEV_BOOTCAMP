<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="header-logo">
        <div id="logo">
              <span class="material-symbols-outlined logo-icon">check_circle</span>
            <h1 id="header-title">TO-DO List</h1>
        </div>
        <h3 id="subheader-title">Stay organized and productive</h3>
    </div>
    
    <div id="input-button">
        <input id="input-field" type="text" placeholder="Add a new task..." />
        <button id="add-button">
            <span id="add-icon" class="material-symbols-outlined">add</span>
            <div>Add</div>
        </button>
    </div>

    <div id="stats">
        <div class="card">
            <h2 id="stat-active">0</h2>
            <h3>Active</h3>
        </div>
        <div class="card">
            <h2 id="stat-completed">0</h2>
            <h3>Completed</h3>
        </div>
        <div class="card">
            <h2 id="stat-total">0</h2>
            <h3>Total</h3>
        </div>
    </div>

    <div id="task-list">
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
